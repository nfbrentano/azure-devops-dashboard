<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Azure DevOps Metrics</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script type="module" crossorigin src="/azure-devops-dashboard/assets/index-Bnn7Saqy.js"></script>
    <link rel="stylesheet" crossorigin href="/azure-devops-dashboard/assets/index-isVpX38Y.css">
  </head>
  <body>
    <div id="app">
      <!-- Tab Navigation -->
      <nav class="tabs-nav no-print glass">
        <div class="tabs-center">
          <button id="tab-dashboard" class="tab-btn active"><i class="ph-bold ph-layout"></i> Dashboard</button>
          <button id="tab-setup" class="tab-btn"><i class="ph-bold ph-gear"></i> Setup</button>
        </div>
        <button id="theme-toggle" class="glass btn-icon-glass theme-toggle-nav" title="Toggle Dark/Light Mode">
          <i class="ph-bold ph-sun-dim"></i>
        </button>
      </nav>

      <!-- Setup View -->
      <div id="setup-view" class="setup-container glass hidden">
        <i class="ph-fill ph-chart-line-up" style="font-size: 3rem; color: var(--primary); margin-bottom: 2rem; display: block;"></i>
        <h2>Azure DevOps Dashboard</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Conecte sua conta para visualizar métricas</p>
        
        <form id="setup-form">
          <div class="form-group">
            <label>Organização <i class="ph ph-info info-icon" data-tooltip="O identificador da sua organização no Azure DevOps. Você o encontra na URL: dev.azure.com/{sua-organizacao}"></i></label>
            <input type="text" id="org" placeholder="ex: minha-empresa" required>
          </div>
          <div class="form-group">
            <label>Projeto <i class="ph ph-info info-icon" data-tooltip="O nome exato do projeto dentro da organização do Azure DevOps."></i></label>
            <input type="text" id="project" placeholder="ex: meu-projeto" required>
          </div>
          <div class="form-group">
            <label>Personal Access Token (PAT) <i class="ph ph-info info-icon" data-tooltip="Token de acesso pessoal. Gere no Azure DevOps em 'User Settings' > 'Personal Access Tokens'. Escopo necessário: 'Work Items: Read'."></i></label>
            <input type="password" id="pat" placeholder="Seu Token do Azure" required>
          </div>
          <button type="submit" data-tooltip="Clique para validar suas credenciais e carregar as consultas disponíveis no seu projeto.">Conectar e Carregar Consultas</button>
        </form>

        <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--border-glass);">
          <button id="logout-btn" class="glass btn-danger-glass" data-tooltip="Sai da conta atual e limpa as credenciais salvas localmente neste navegador."><i class="ph-bold ph-sign-out"></i> Sair da Conta</button>
        </div>
      </div>

      <!-- Main Dashboard View (Hidden initially) -->
      <div id="dashboard-view" class="hidden">
        <header>
          <div>
            <h1>Development Analytics</h1>
            <p id="active-query-name" style="color: var(--text-muted); margin-top: 0.5rem;">Selecione uma consulta para começar</p>
          </div>
          <div class="header-actions">
             <select id="query-selector" class="glass header-select" title="Select Analytics Query"></select>
             <button id="refresh-btn" class="glass btn-icon-glass" title="Refresh Data"><i class="ph-bold ph-arrows-clockwise"></i></button>
           </div>
        </header>

        <div class="dashboard-grid">
          <div class="card glass">
            <div class="card-title">
              <div style="display: flex; align-items: center; gap: 0.75rem;">
                <i class="ph-bold ph-calendar-check"></i>
                Lead Time <i class="ph ph-info info-icon" data-tooltip="O Lead Time mede o tempo total desde que um item é criado até ser concluído. Ele reflete a experiência completa do cliente/solicitante."></i>
              </div>
            </div>
            <div style="height: 300px;">
              <canvas id="leadTimeChart"></canvas>
            </div>
          </div>

          <!-- Cycle Time Card -->
          <div class="card glass">
            <div class="card-title">
              <div style="display: flex; align-items: center; gap: 0.75rem;">
                <i class="ph-bold ph-timer"></i>
                Cycle Time <i class="ph ph-info info-icon" data-tooltip="O Cycle Time mede o tempo em que o item esteve efetivamente em desenvolvimento (movido para 'In Progress' até ser concluído). Ele foca na eficiência da execução."></i>
              </div>
            </div>
            <div style="height: 300px;">
              <canvas id="cycleTimeChart"></canvas>
            </div>
          </div>

          <!-- Comparison Chart Card -->
          <div class="card glass" style="grid-column: 1 / -1; margin-top: 1rem;">
            <div class="card-title">
              <div style="display: flex; align-items: center; gap: 0.75rem;">
                <i class="ph-bold ph-stack"></i>
                Lead vs Cycle Time Comparison <i class="ph ph-info info-icon" data-tooltip="Este gráfico compara o Lead Time e Cycle Time médio do período atual com o período anterior, permitindo identificar tendências de melhoria ou gargalos."></i>
              </div>
            </div>
            <div style="height: 400px;">
              <canvas id="comparisonChart"></canvas>
            </div>
          </div>

          <!-- Progress List Card -->
          <div class="card glass" style="grid-column: 1 / -1;">
            <div class="card-title" style="justify-content: space-between;">
              <div style="display: flex; align-items: center; gap: 0.75rem;">
                <i class="ph-bold ph-chart-line-up"></i>
                Features & Portfolio <i class="ph ph-info info-icon" data-tooltip="Visualização macro do progresso de Epics e Features, mostrando como os itens estão distribuídos pelas diversas etapas do fluxo de trabalho."></i>
              </div>
              <div id="portfolio-status-filters" class="gantt-status-filters no-print">
                <!-- Populated dynamically -->
              </div>
            </div>
            <div id="progress-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem;">
                <!-- Will be populated by JS -->
            </div>
          </div>

          <div class="card glass" style="grid-column: 1 / -1;">
            <div class="card-title" style="justify-content: space-between;">
              <div style="display: flex; align-items: center; gap: 0.75rem;">
                <i class="ph-bold ph-projector-screen-chart"></i>
                Hierarchical Gantt <i class="ph ph-info info-icon" data-tooltip="Uma linha do tempo hierárquica que mostra a duração e o encadeamento dos itens de trabalho, permitindo visualizar o sequenciamento e dependências do projeto."></i>
              </div>
              <div style="display: flex; gap: 0.5rem; align-items: center;">
                <button id="gantt-prev" class="glass" style="padding: 0.25rem 0.5rem; border-radius: 0.4rem; cursor: pointer;">
                  <i class="ph ph-caret-left"></i>
                </button>
                <button id="gantt-next" class="glass" style="padding: 0.25rem 0.5rem; border-radius: 0.4rem; cursor: pointer;">
                  <i class="ph ph-caret-right"></i>
                </button>
                <div style="width: 1px; height: 16px; background: var(--border-glass); margin: 0 0.25rem;"></div>
                <div class="gantt-status-filters" style="display: flex; gap: 0.75rem; align-items: center; margin: 0 0.5rem;">
                   <label class="filter-item"><input type="checkbox" data-category="Backlog" checked> <span>Backlog</span></label>
                   <label class="filter-item"><input type="checkbox" data-category="InProgress" checked> <span>In Progress</span></label>
                   <label class="filter-item"><input type="checkbox" data-category="Completed" checked> <span>Done</span></label>
                   <label class="filter-item"><input type="checkbox" data-category="Removed"> <span>Removed</span></label>
                </div>
                <div style="width: 1px; height: 16px; background: var(--border-glass); margin: 0 0.25rem;"></div>
                <label style="margin: 0; font-size: 0.75rem;">Período:</label>
                <select id="gantt-period" class="glass" style="padding: 0.25rem 0.5rem; font-size: 0.75rem;">
                  <option value="total">Tudo (Auto-ajuste)</option>
                  <option value="year">Ano</option>
                  <option value="trimester">Trimestre</option>
                  <option value="bimester">Bimestre</option>
                  <option value="month" selected>Mês</option>
                  <option value="week">Semana</option>
                </select>
              </div>
            </div>
            <div id="gantt-container" style="overflow-x: auto; padding-bottom: 1rem; position: relative;">
                <!-- Custom Gantt implementation -->
            </div>
            
            <div class="legend" id="gantt-legend" style="flex-direction: column; align-items: flex-start; gap: 1.25rem;">
                <div class="legend-group">
                    <span class="legend-group-title">Classificação de Itens</span>
                    <div id="type-legend" style="display: flex; gap: 1.5rem; flex-wrap: wrap; align-items: center;">
                        <!-- Populated dynamically -->
                    </div>
                </div>
                
                <div class="legend-group">
                    <span class="legend-group-title">Status de Entrega (Cor da Barra)</span>
                    <div id="status-legend" style="display: flex; gap: 1.5rem; flex-wrap: wrap; align-items: center;">
                        <!-- Populated dynamically -->
                    </div>
                </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
