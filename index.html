<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Azure DevOps Metrics</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script type="module" crossorigin src="/azure-devops-dashboard/assets/index-DG7unlCP.js"></script>
    <link rel="modulepreload" crossorigin href="/azure-devops-dashboard/assets/chunk-B3K2TuZy.js">
    <link rel="stylesheet" crossorigin href="/azure-devops-dashboard/assets/index-mF5bzMco.css">
  </head>
  <body>
    <div id="app">
      <!-- Setup View -->
      <div id="setup-view" class="setup-container glass">
        <i class="ph-fill ph-chart-line-up" style="font-size: 3rem; color: var(--primary); margin-bottom: 2rem; display: block;"></i>
        <h2>Azure DevOps Dashboard</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Conecte sua conta para visualizar métricas</p>
        
        <form id="setup-form">
          <div class="form-group">
            <label>Organização</label>
            <input type="text" id="org" placeholder="ex: minha-empresa" required>
          </div>
          <div class="form-group">
            <label>Projeto</label>
            <input type="text" id="project" placeholder="ex: meu-projeto" required>
          </div>
          <div class="form-group">
            <label>Personal Access Token (PAT)</label>
            <input type="password" id="pat" placeholder="Seu Token do Azure" required>
          </div>
          <button type="submit">Conectar e Carregar Consultas</button>
        </form>
      </div>

      <!-- Main Dashboard View (Hidden initially) -->
      <div id="dashboard-view" class="hidden">
        <header>
          <div>
            <h1>Development Analytics</h1>
            <p id="active-query-name" style="color: var(--text-muted); margin-top: 0.5rem;">Selecione uma consulta para começar</p>
          </div>
          <div style="display: flex; gap: 1rem; align-items: center;">
             <button id="export-all-pdf" class="glass" style="width: auto; padding: 0.5rem 1rem; background: var(--primary); color: white; border: none;"><i class="ph-bold ph-file-pdf"></i> Full Report</button>
             <select id="query-selector" class="glass" style="padding: 0.5rem 1rem;"></select>
             <button id="refresh-btn" class="glass" style="width: auto; padding: 0.5rem 1rem;"><i class="ph ph-arrows-clockwise"></i></button>
             <button id="theme-toggle" class="glass" style="width: auto; padding: 0.5rem 1rem;"><i class="ph ph-sun-dim"></i></button>
             <button id="logout-btn" class="glass" style="width: auto; padding: 0.5rem 1rem; background: rgba(239, 68, 68, 0.1); color: #ef4444;"><i class="ph ph-sign-out"></i></button>
          </div>
        </header>

        <div class="dashboard-grid">
          <!-- Lead Time Card -->
          <div class="card glass">
            <div class="card-title" style="justify-content: space-between;">
              <div style="display: flex; align-items: center; gap: 0.75rem;">
                <i class="ph-bold ph-calendar-check"></i>
                Lead Time
              </div>
              <button class="export-chart-pdf no-print" data-chart="leadTimeChart" title="Export PDF"><i class="ph ph-download-simple"></i></button>
            </div>
            <div style="height: 300px;">
              <canvas id="leadTimeChart"></canvas>
            </div>
          </div>

          <!-- Cycle Time Card -->
          <div class="card glass">
            <div class="card-title" style="justify-content: space-between;">
              <div style="display: flex; align-items: center; gap: 0.75rem;">
                <i class="ph-bold ph-timer"></i>
                Cycle Time
              </div>
              <button class="export-chart-pdf no-print" data-chart="cycleTimeChart" title="Export PDF"><i class="ph ph-download-simple"></i></button>
            </div>
            <div style="height: 300px;">
              <canvas id="cycleTimeChart"></canvas>
            </div>
          </div>

          <!-- Comparison Chart Card -->
          <div class="card glass" style="grid-column: 1 / -1; margin-top: 1rem;">
            <div class="card-title" style="justify-content: space-between;">
              <div style="display: flex; align-items: center; gap: 0.75rem;">
                <i class="ph-bold ph-stack"></i>
                Lead vs Cycle Time Comparison
              </div>
              <button class="export-chart-pdf no-print" data-chart="comparisonChart" title="Export PDF"><i class="ph ph-download-simple"></i></button>
            </div>
            <div style="height: 400px;">
              <canvas id="comparisonChart"></canvas>
            </div>
          </div>

          <!-- Progress List Card -->
          <div class="card glass" style="grid-column: 1 / -1;">
            <div class="card-title">
              <i class="ph-bold ph-chart-line-up"></i>
              Features & Portfolio
            </div>
            <div id="progress-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem;">
                <!-- Will be populated by JS -->
            </div>
          </div>

          <div class="card glass" style="grid-column: 1 / -1;">
            <div class="card-title" style="justify-content: space-between;">
              <div style="display: flex; align-items: center; gap: 0.75rem;">
                <i class="ph-bold ph-projector-screen-chart"></i>
                Hierarchical Gantt
              </div>
              <div style="display: flex; gap: 0.5rem; align-items: center;">
                <button class="export-chart-pdf no-print" data-element="gantt-container" title="Export PDF" style="margin-right: 0.5rem;"><i class="ph ph-download-simple"></i></button>
                <div style="width: 1px; height: 16px; background: var(--border-glass); margin: 0 0.5rem;"></div>
                <button id="gantt-prev" class="glass" style="padding: 0.25rem 0.5rem; border-radius: 0.4rem; cursor: pointer;">
                  <i class="ph ph-caret-left"></i>
                </button>
                <button id="gantt-next" class="glass" style="padding: 0.25rem 0.5rem; border-radius: 0.4rem; cursor: pointer;">
                  <i class="ph ph-caret-right"></i>
                </button>
                <div style="width: 1px; height: 16px; background: var(--border-glass); margin: 0 0.25rem;"></div>
                <label style="margin: 0; font-size: 0.75rem;">Período:</label>
                <select id="gantt-period" class="glass" style="padding: 0.25rem 0.5rem; font-size: 0.75rem;">
                  <option value="total">Tudo (Auto-ajuste)</option>
                  <option value="year">Ano</option>
                  <option value="trimester">Trimestre</option>
                  <option value="bimester">Bimestre</option>
                  <option value="month" selected>Mês</option>
                  <option value="week">Semana</option>
                </select>
              </div>
            </div>
            <div id="gantt-container" style="overflow-x: auto; padding-bottom: 1rem; position: relative;">
                <!-- Custom Gantt implementation -->
            </div>
            
            <div class="legend" id="gantt-legend">
                <div class="legend-item"><div class="legend-color" style="background: var(--status-backlog)"></div> Backlog (New/Outros)</div>
                <div class="legend-item"><div class="legend-color" style="background: var(--status-inprogress)"></div> In Progress</div>
                <div class="legend-item"><div class="legend-color" style="background: var(--status-done)"></div> Done</div>
                <div class="legend-item"><div class="legend-color" style="background: var(--status-removed); border: 1px solid var(--border-glass)"></div> Removed</div>
                
                <div style="width: 1px; height: 12px; background: var(--border-glass); margin: 0 0.5rem;"></div>
                
                <div class="legend-item"><i class="ph-fill ph-crown icon-epic"></i> Epic</div>
                <div class="legend-item"><i class="ph-fill ph-trophy icon-feature"></i> Feature</div>
                <div class="legend-item"><i class="ph-fill ph-notebook icon-userstory"></i> User Story</div>
                <div class="legend-item"><i class="ph-fill ph-check-square icon-task"></i> Task</div>
                <div class="legend-item"><i class="ph-fill ph-bug icon-bug"></i> Bug</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
